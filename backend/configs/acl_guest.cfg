ip access-list extended GUEST_NETWORK
 permit tcp any host 8.8.8.8 eq 53
 permit udp any host 8.8.8.8 eq 53
 permit tcp any any eq 80
 permit tcp any any eq 443
 deny ip any 10.0.0.0 0.0.255.255
 permit ip any any
ip access-list extended INTERNAL_ONLY
 permit ip 10.0.0.0 0.0.255.255 10.0.0.0 0.0.255.255
 deny ip any any
interface Vlan100
 description Guest Network
 ip access-group GUEST_NETWORK in
 ip access-group INTERNAL_ONLY out
